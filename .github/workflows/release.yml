name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  native-validation:
    if: >-
      ${{ (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.head_branch == 'main' &&
           github.event.workflow_run.head_repository.full_name == github.repository) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64-gnu
            runner: ubuntu-24.04
            architecture: X64
          - target: linux-arm64-gnu
            runner: ubuntu-24.04-arm
            architecture: ARM64
          - target: win32-x64
            runner: windows-2025
            architecture: X64
          - target: win32-arm64
            runner: windows-11-arm
            architecture: ARM64
          - target: darwin-arm64
            runner: macos-14
            architecture: ARM64
          - target: darwin-x64
            runner: macos-13
            architecture: X64
    runs-on: ${{ matrix.runner }}
    environment: release
    env:
      RELEASE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ env.RELEASE_SHA }}
      - name: Verify checked commit
        shell: pwsh
        run: |-
          if ((git rev-parse HEAD) -ne $env:RELEASE_SHA) { throw "Checked out $(git rev-parse HEAD), expected $env:RELEASE_SHA." }
          if ($env:RUNNER_ARCH -ne '${{ matrix.architecture }}') { throw "Runner architecture $env:RUNNER_ARCH cannot build native target ${{ matrix.target }}; expected ${{ matrix.architecture }}." }
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.8
      - uses: dtolnay/rust-toolchain@45f5412a0cc5dee553bb061a37369fc8e63fa137 # 1.93.0
      - run: bun ci
      - name: Build native worker
        run: cargo build --locked --release --workspace
      - name: Sign Windows worker
        if: startsWith(matrix.target, 'win32-')
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERTIFICATE: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE }}
          WINDOWS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
          WINDOWS_SIGNING_TIMESTAMP_URL: ${{ vars.WINDOWS_SIGNING_TIMESTAMP_URL }}
        run: |-
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERTIFICATE)) { throw 'Missing protected WINDOWS_SIGNING_CERTIFICATE.' }
          $certificate = Join-Path $env:RUNNER_TEMP worker-signing.pfx
          [IO.File]::WriteAllBytes($certificate, [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERTIFICATE))
          $env:WINDOWS_SIGNING_CERTIFICATE_PATH = $certificate
          bun native:sign:windows ${{ matrix.target }}
          Remove-Item -Force $certificate
      - name: Verify macOS signing credentials
        if: startsWith(matrix.target, 'darwin-')
        shell: bash
        env:
          APPLE_SIGNING_CERTIFICATE_P12: ${{ secrets.APPLE_SIGNING_CERTIFICATE_P12 }}
          APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
        run: |-
          set -euo pipefail
          test -n "$APPLE_SIGNING_CERTIFICATE_P12"
          test -n "$APPLE_SIGNING_CERTIFICATE_PASSWORD"
      - name: Import macOS signing certificate
        if: startsWith(matrix.target, 'darwin-')
        uses: apple-actions/import-codesign-certs@63fff01cd422d4b7b855d40ca1e9d34d2de9427d # v3
        with:
          p12-file-base64: ${{ secrets.APPLE_SIGNING_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
      - name: Configure and sign macOS worker
        if: startsWith(matrix.target, 'darwin-')
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ vars.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY_ID: ${{ vars.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ vars.APPLE_API_ISSUER }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |-
          set -euo pipefail
          test -n "$APPLE_SIGNING_IDENTITY"
          test -n "$APPLE_API_KEY_ID"
          test -n "$APPLE_API_ISSUER"
          test -n "$APPLE_API_KEY_P8"
          key="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$key"
          xcrun notarytool store-credentials opencode-pty-release --key "$key" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER"
          rm -f "$key"
          APPLE_NOTARY_KEYCHAIN_PROFILE=opencode-pty-release bun native:sign:macos ${{ matrix.target }}
      - name: Run daemon suite
        run: bun unittest
      - run: bun run tui:verify
      - run: bun build:prod
      - name: Packaged-worker smoke
        run: bun package:smoke
      - name: Pack platform worker artifact
        shell: pwsh
        run: |-
          bun native:prepare ${{ matrix.target }}
          New-Item -ItemType Directory native-dist | Out-Null
          npm pack --pack-destination native-dist native-artifacts/${{ matrix.target }}
      - name: Upload native worker artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: native-worker-${{ matrix.target }}
          path: native-dist/*.tgz
      - name: Attest native worker archive
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: native-dist/*.tgz
      - name: Pack, import, and start the daemon
        shell: pwsh
        run: |
          $package = Join-Path $env:RUNNER_TEMP "opencode-pty-$([guid]::NewGuid())"
          $state = Join-Path $env:RUNNER_TEMP "opencode-pty-state-$([guid]::NewGuid())"
          $previousState = $env:PTY_DAEMON_DIR
          $daemon = $null
          try {
            New-Item -ItemType Directory -Path $package, $state | Out-Null
            npm pack --pack-destination $package
            $archive = (Get-ChildItem -Path $package -Filter *.tgz | Select-Object -First 1).FullName
            npm install --prefix (Join-Path $package installed) $archive
            $installed = Join-Path $package 'installed/node_modules/opencode-pty'
            bun --cwd (Join-Path $package installed) -e "const [plugin, server, tui] = await Promise.all(['opencode-pty', 'opencode-pty/server', 'opencode-pty/tui'].map(specifier => import(specifier))); if (typeof plugin.PTYPlugin !== 'function' || plugin.server !== plugin.PTYPlugin || server.server !== plugin.PTYPlugin || typeof tui.tui !== 'function') throw new Error('Package is missing compatible server or TUI exports.')"
            $env:PTY_DAEMON_DIR = $state
            $daemon = Start-Process -FilePath bun -ArgumentList @('--cwd', $installed, 'dist/src/daemon/main.js') -PassThru
            1..40 | ForEach-Object {
              if (Test-Path (Join-Path $state daemon.json)) { return }
              Start-Sleep -Milliseconds 100
            }
            if (-not (Test-Path (Join-Path $state daemon.json))) { throw 'Packaged daemon did not start.' }
          } finally {
            if ($null -ne $daemon -and -not $daemon.HasExited) {
              Stop-Process -Id $daemon.Id -Force -ErrorAction SilentlyContinue
              Wait-Process -Id $daemon.Id -ErrorAction SilentlyContinue
            }
            $env:PTY_DAEMON_DIR = $previousState
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue $package, $state
          }

  publish:
    needs: native-validation
    if: >-
      ${{ needs.native-validation.result == 'success' &&
          ((github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.head_branch == 'main' &&
           github.event.workflow_run.head_repository.full_name == github.repository)) }}
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Verify checked commit
        run: test "$(git rev-parse HEAD)" = "${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.8

      - name: Determine release state
        id: determine
        run: |
          set -euo pipefail
          CURRENT_VERSION=$(bun -e 'import pkg from "./package.json"; console.log(pkg.version)')
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            PREVIOUS_VERSION=$(bun -e "const { execSync } = require('node:child_process'); try { const data = execSync('git show HEAD^:package.json', { stdio: ['ignore', 'pipe', 'ignore'] }); const json = JSON.parse(data.toString()); if (json && typeof json.version === 'string') { process.stdout.write(json.version); } } catch (error) {}")
            PREVIOUS_VERSION=${PREVIOUS_VERSION//$'\n'/}
          else
            PREVIOUS_VERSION=""
          fi
          echo "previous_version=$PREVIOUS_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT_VERSION" = "$PREVIOUS_VERSION" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          git fetch --tags --force
          if git tag -l "v$CURRENT_VERSION" | grep -q "v$CURRENT_VERSION"; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: bun ci

      - name: Download native worker artifacts
        if: steps.determine.outputs.changed == 'true' && steps.determine.outputs.tag_exists == 'false'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: native-worker-*
          path: native-artifacts
          merge-multiple: true

      - name: Write native artifact checksums and provenance
        if: steps.determine.outputs.changed == 'true' && steps.determine.outputs.tag_exists == 'false'
        run: bun native:manifest native-artifacts "${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"

      - name: Verify complete native artifact assembly
        if: steps.determine.outputs.changed == 'true' && steps.determine.outputs.tag_exists == 'false'
        run: bun native:verify native-artifacts "${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"

      - name: Install Cosign
        if: steps.determine.outputs.changed == 'true' && steps.determine.outputs.tag_exists == 'false'
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign and verify native artifact manifest
        if: steps.determine.outputs.changed == 'true' && steps.determine.outputs.tag_exists == 'false'
        env:
          NATIVE_ARTIFACT_SIGNING_KEY: ${{ secrets.NATIVE_ARTIFACT_SIGNING_KEY }}
          NATIVE_ARTIFACT_SIGNING_PUBLIC_KEY: ${{ secrets.NATIVE_ARTIFACT_SIGNING_PUBLIC_KEY }}
          COSIGN_PASSWORD: ${{ secrets.NATIVE_ARTIFACT_SIGNING_PASSWORD }}
        run: bun native:sign native-artifacts "${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"

      - name: Verify signed native artifact assembly
        if: steps.determine.outputs.changed == 'true' && steps.determine.outputs.tag_exists == 'false'
        run: bun native:verify native-artifacts "${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"

      - name: Validate release artifact
        run: |
          set -euo pipefail
          bun typecheck
          bun unittest
           bun lint
           bun format
           bun run tui:verify
           bun build:prod
          bun package:smoke
          npm pack --dry-run
          package=$(mktemp -d)
          state=$(mktemp -d)
          daemon_pid=""
          cleanup() {
            if [ -n "$daemon_pid" ]; then
              kill -TERM "$daemon_pid" 2>/dev/null || true
              wait "$daemon_pid" 2>/dev/null || true
            fi
            rm -rf "$package" "$state"
          }
          trap cleanup EXIT
          npm pack --pack-destination "$package"
          npm install --prefix "$package/installed" "$package"/*.tgz
          bun --cwd "$package/installed" -e "const [plugin, server, tui] = await Promise.all(['opencode-pty', 'opencode-pty/server', 'opencode-pty/tui'].map(specifier => import(specifier))); if (typeof plugin.PTYPlugin !== 'function' || plugin.server !== plugin.PTYPlugin || server.server !== plugin.PTYPlugin || typeof tui.tui !== 'function') throw new Error('Package is missing compatible server or TUI exports.')"
          PTY_DAEMON_DIR="$state" bun --cwd "$package/installed/node_modules/opencode-pty" dist/src/daemon/main.js &
          daemon_pid=$!
          for _ in $(seq 1 20); do test -f "$state/daemon.json" && break; sleep 0.1; done
          test -f "$state/daemon.json"

      - name: Generate release notes
        if: steps.determine.outputs.changed == 'true' && steps.determine.outputs.tag_exists == 'false'
        id: release_notes
        run: |
          set -euo pipefail
          CURRENT_VERSION="${{ steps.determine.outputs.current_version }}"
          PREVIOUS_VERSION="${{ steps.determine.outputs.previous_version }}"
          RANGE=""
          COMPARE_URL=""
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          if [ -z "$LAST_TAG" ] && [ -n "$PREVIOUS_VERSION" ] && git rev-parse "refs/tags/v${PREVIOUS_VERSION}" >/dev/null 2>&1; then
            LAST_TAG="v${PREVIOUS_VERSION}"
          fi
          if [ -n "$LAST_TAG" ]; then
            RANGE="${LAST_TAG}..HEAD"
            COMPARE_URL="https://github.com/${GITHUB_REPOSITORY}/compare/${LAST_TAG}...v${CURRENT_VERSION}"
          fi
          if [ -n "$RANGE" ]; then
            CHANGELOG=$(git log --no-merges --pretty=format:'- %s (%h)' "$RANGE")
          else
            CHANGELOG=$(git log --no-merges --pretty=format:'- %s (%h)')
          fi
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- Initial release"
          fi
          BODY_FILE=$(mktemp)
          {
            echo "## Release v${CURRENT_VERSION}"
            echo ""
            if [ -n "$COMPARE_URL" ]; then
              echo "Compare changes: $COMPARE_URL"
              echo ""
            fi
            printf "%s\n" "$CHANGELOG"
            echo ""
            echo "### Installation"
            echo ""
            echo "Add to your \`opencode.json\`:"
            echo ""
            printf '%s\n' '```json'
            printf '%s\n' '{'
            printf '%s\n' '  "$schema": "https://opencode.ai/config.json",'
            printf '%s\n' '  "plugin": ["opencode-pty"]'
            printf '%s\n' '}'
            printf '%s\n' '```'
            echo ""
            echo "### Update Instructions"
            echo ""
            echo "To get the latest version:"
            echo ""
            printf '%s\n' '```bash'
            printf '%s\n' 'rm -rf ~/.cache/opencode/node_modules/opencode-pty'
            printf '%s\n' 'opencode'
            printf '%s\n' '```'
          } >"$BODY_FILE"
          cat "$BODY_FILE"
          {
            echo "body<<EOF"
            cat "$BODY_FILE"
            echo "EOF"
          } >>"$GITHUB_OUTPUT"

      - name: Setup Node
        if: steps.determine.outputs.changed == 'true' && steps.determine.outputs.tag_exists == 'false'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        if: steps.determine.outputs.changed == 'true' && steps.determine.outputs.tag_exists == 'false'
        env:
          NATIVE_ARTIFACT_SIGNING_PUBLIC_KEY: ${{ secrets.NATIVE_ARTIFACT_SIGNING_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          bun native:publish native-artifacts "${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"

      - name: Create GitHub release
        if: steps.determine.outputs.changed == 'true' && steps.determine.outputs.tag_exists == 'false'
        run: |
          NOTES_FILE=$(mktemp)
          cat >"$NOTES_FILE" <<'EOF'
          ${{ steps.release_notes.outputs.body }}
          EOF
          gh release create "v${{ steps.determine.outputs.current_version }}" \
            --title "v${{ steps.determine.outputs.current_version }}" \
            --notes-file "$NOTES_FILE" \
            native-artifacts/*.tgz native-artifacts/native-artifacts.json native-artifacts/native-artifacts.json.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
