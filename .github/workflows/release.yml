name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  native-validation:
    if: >-
      ${{ (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.head_branch == 'main' &&
           github.event.workflow_run.head_repository.full_name == github.repository) }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_SHA }}
      - name: Verify checked commit
        shell: pwsh
        run: |-
          if ((git rev-parse HEAD) -ne $env:RELEASE_SHA) { throw "Checked out $(git rev-parse HEAD), expected $env:RELEASE_SHA." }
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8
      - uses: dtolnay/rust-toolchain@1.93.0
      - run: bun ci
      - name: Build native worker
        run: cargo build --locked --release --workspace
      - name: Run full daemon/package suite
        run: bun unittest
      - run: bun build:prod
      - name: Exercise native exec from the packed artifact
        run: bun test/packaged-native-daemon.ts
      - name: Pack platform worker artifact
        shell: pwsh
        run: |-
          $platform = "${{ runner.os }}".ToLowerInvariant().Replace("windows", "win32")
          if ($platform -eq "linux") { $platform = "linux-x64-gnu" }
          elseif ($platform -eq "win32") { $platform = "win32-x64" }
          elseif ($platform -eq "macos") { $platform = "darwin-arm64" }
          bun native:prepare $platform
          New-Item -ItemType Directory native-dist | Out-Null
          npm pack --pack-destination native-dist native-artifacts/$platform
      - name: Upload native worker artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-worker-${{ runner.os }}
          path: native-dist/*.tgz
      - name: Pack, import, and start the daemon
        shell: pwsh
        run: |
          $package = Join-Path $env:RUNNER_TEMP "opencode-pty-$([guid]::NewGuid())"
          $state = Join-Path $env:RUNNER_TEMP "opencode-pty-state-$([guid]::NewGuid())"
          $previousState = $env:PTY_DAEMON_DIR
          $daemon = $null
          try {
            New-Item -ItemType Directory -Path $package, $state | Out-Null
            npm pack --pack-destination $package
            $archive = (Get-ChildItem -Path $package -Filter *.tgz | Select-Object -First 1).FullName
            npm install --prefix (Join-Path $package installed) $archive
            $installed = Join-Path $package 'installed/node_modules/opencode-pty'
            bun --cwd (Join-Path $package installed) -e "const plugin = await import('opencode-pty'); if (typeof plugin.PTYPlugin -ne 'function' -or plugin.server -ne plugin.PTYPlugin) { throw 'Package is missing compatible PTYPlugin/server exports.' }"
            $env:PTY_DAEMON_DIR = $state
            $daemon = Start-Process -FilePath bun -ArgumentList @('--cwd', $installed, 'dist/src/daemon/main.js') -PassThru
            1..40 | ForEach-Object {
              if (Test-Path (Join-Path $state daemon.json)) { return }
              Start-Sleep -Milliseconds 100
            }
            if (-not (Test-Path (Join-Path $state daemon.json))) { throw 'Packaged daemon did not start.' }
          } finally {
            if ($null -ne $daemon -and -not $daemon.HasExited) {
              Stop-Process -Id $daemon.Id -Force -ErrorAction SilentlyContinue
              Wait-Process -Id $daemon.Id -ErrorAction SilentlyContinue
            }
            $env:PTY_DAEMON_DIR = $previousState
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue $package, $state
          }

  publish:
    needs: native-validation
    if: >-
      ${{ needs.native-validation.result == 'success' &&
          ((github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.head_branch == 'main' &&
           github.event.workflow_run.head_repository.full_name == github.repository)) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Verify checked commit
        run: test "$(git rev-parse HEAD)" = "${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Determine release state
        id: determine
        run: |
          set -euo pipefail
          CURRENT_VERSION=$(bun -e 'import pkg from "./package.json"; console.log(pkg.version)')
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            PREVIOUS_VERSION=$(bun -e "const { execSync } = require('node:child_process'); try { const data = execSync('git show HEAD^:package.json', { stdio: ['ignore', 'pipe', 'ignore'] }); const json = JSON.parse(data.toString()); if (json && typeof json.version === 'string') { process.stdout.write(json.version); } } catch (error) {}")
            PREVIOUS_VERSION=${PREVIOUS_VERSION//$'\n'/}
          else
            PREVIOUS_VERSION=""
          fi
          echo "previous_version=$PREVIOUS_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT_VERSION" = "$PREVIOUS_VERSION" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          git fetch --tags --force
          if git tag -l "v$CURRENT_VERSION" | grep -q "v$CURRENT_VERSION"; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: bun ci

      - name: Download native worker artifacts
        if: steps.determine.outputs.changed == 'true' && steps.determine.outputs.tag_exists == 'false'
        uses: actions/download-artifact@v4
        with:
          pattern: native-worker-*
          path: native-artifacts
          merge-multiple: true

      - name: Write native artifact checksums and provenance
        if: steps.determine.outputs.changed == 'true' && steps.determine.outputs.tag_exists == 'false'
        run: bun native:manifest native-artifacts "${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"

      - name: Install Cosign
        if: steps.determine.outputs.changed == 'true' && steps.determine.outputs.tag_exists == 'false'
        uses: sigstore/cosign-installer@v3

      - name: Sign and verify native artifact manifest
        if: steps.determine.outputs.changed == 'true' && steps.determine.outputs.tag_exists == 'false'
        env:
          NATIVE_ARTIFACT_SIGNING_KEY: ${{ secrets.NATIVE_ARTIFACT_SIGNING_KEY }}
          NATIVE_ARTIFACT_SIGNING_PUBLIC_KEY: ${{ secrets.NATIVE_ARTIFACT_SIGNING_PUBLIC_KEY }}
          COSIGN_PASSWORD: ${{ secrets.NATIVE_ARTIFACT_SIGNING_PASSWORD }}
        run: bun native:sign native-artifacts

      - name: Validate release artifact
        run: |
          set -euo pipefail
          bun typecheck
          bun unittest
          bun lint
          bun format
          bun build:prod
          bun package:smoke
          npm pack --dry-run
          package=$(mktemp -d)
          state=$(mktemp -d)
          daemon_pid=""
          cleanup() {
            if [ -n "$daemon_pid" ]; then
              kill -TERM "$daemon_pid" 2>/dev/null || true
              wait "$daemon_pid" 2>/dev/null || true
            fi
            rm -rf "$package" "$state"
          }
          trap cleanup EXIT
          npm pack --pack-destination "$package"
          npm install --prefix "$package/installed" "$package"/*.tgz
          bun --cwd "$package/installed" -e "const plugin = await import('opencode-pty'); if (typeof plugin.PTYPlugin !== 'function' || plugin.server !== plugin.PTYPlugin) throw new Error('Package is missing compatible PTYPlugin/server exports.')"
          PTY_DAEMON_DIR="$state" bun --cwd "$package/installed/node_modules/opencode-pty" dist/src/daemon/main.js &
          daemon_pid=$!
          for _ in $(seq 1 20); do test -f "$state/daemon.json" && break; sleep 0.1; done
          test -f "$state/daemon.json"

      - name: Generate release notes
        if: steps.determine.outputs.changed == 'true' && steps.determine.outputs.tag_exists == 'false'
        id: release_notes
        run: |
          set -euo pipefail
          CURRENT_VERSION="${{ steps.determine.outputs.current_version }}"
          PREVIOUS_VERSION="${{ steps.determine.outputs.previous_version }}"
          RANGE=""
          COMPARE_URL=""
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          if [ -z "$LAST_TAG" ] && [ -n "$PREVIOUS_VERSION" ] && git rev-parse "refs/tags/v${PREVIOUS_VERSION}" >/dev/null 2>&1; then
            LAST_TAG="v${PREVIOUS_VERSION}"
          fi
          if [ -n "$LAST_TAG" ]; then
            RANGE="${LAST_TAG}..HEAD"
            COMPARE_URL="https://github.com/${GITHUB_REPOSITORY}/compare/${LAST_TAG}...v${CURRENT_VERSION}"
          fi
          if [ -n "$RANGE" ]; then
            CHANGELOG=$(git log --no-merges --pretty=format:'- %s (%h)' "$RANGE")
          else
            CHANGELOG=$(git log --no-merges --pretty=format:'- %s (%h)')
          fi
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- Initial release"
          fi
          BODY_FILE=$(mktemp)
          {
            echo "## Release v${CURRENT_VERSION}"
            echo ""
            if [ -n "$COMPARE_URL" ]; then
              echo "Compare changes: $COMPARE_URL"
              echo ""
            fi
            printf "%s\n" "$CHANGELOG"
            echo ""
            echo "### Installation"
            echo ""
            echo "Add to your \`opencode.json\`:"
            echo ""
            printf '%s\n' '```json'
            printf '%s\n' '{'
            printf '%s\n' '  "$schema": "https://opencode.ai/config.json",'
            printf '%s\n' '  "plugin": ["opencode-pty"]'
            printf '%s\n' '}'
            printf '%s\n' '```'
            echo ""
            echo "### Update Instructions"
            echo ""
            echo "To get the latest version:"
            echo ""
            printf '%s\n' '```bash'
            printf '%s\n' 'rm -rf ~/.cache/opencode/node_modules/opencode-pty'
            printf '%s\n' 'opencode'
            printf '%s\n' '```'
          } >"$BODY_FILE"
          cat "$BODY_FILE"
          {
            echo "body<<EOF"
            cat "$BODY_FILE"
            echo "EOF"
          } >>"$GITHUB_OUTPUT"

      - name: Setup Node
        if: steps.determine.outputs.changed == 'true' && steps.determine.outputs.tag_exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        if: steps.determine.outputs.changed == 'true' && steps.determine.outputs.tag_exists == 'false'
        run: |
          set -euo pipefail
          bun native:publish native-artifacts "${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"

      - name: Create GitHub release
        if: steps.determine.outputs.changed == 'true' && steps.determine.outputs.tag_exists == 'false'
        run: |
          NOTES_FILE=$(mktemp)
          cat >"$NOTES_FILE" <<'EOF'
          ${{ steps.release_notes.outputs.body }}
          EOF
          gh release create "v${{ steps.determine.outputs.current_version }}" \
            --title "v${{ steps.determine.outputs.current_version }}" \
            --notes-file "$NOTES_FILE" \
            native-artifacts/*.tgz native-artifacts/native-artifacts.json native-artifacts/native-artifacts.json.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
