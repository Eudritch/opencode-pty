name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        quality: [unittest, typecheck, lint, format]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun ci

      - name: Build
        run: bun build:prod

      - name: Run quality step
        run: bun ${{matrix.quality}}

  dependency-review:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  package-smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8
      - run: bun ci
      - name: Run full daemon/package suite
        run: bun unittest
      - run: bun build:prod
      - name: Pack and import the artifact
        run: |
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          npm pack --pack-destination "$tmpdir"
          npm install --prefix "$tmpdir/installed" "$tmpdir"/*.tgz
          bun --cwd "$tmpdir/installed" -e "const plugin = await import('opencode-pty'); if (typeof plugin.PTYPlugin !== 'function' || plugin.server !== plugin.PTYPlugin) throw new Error('Package is missing compatible PTYPlugin/server exports.')"
      - name: Start the packaged daemon entrypoint
        run: |
          set -euo pipefail
          state=$(mktemp -d)
          package=""
          daemon_pid=""
          cleanup() {
            if [ -n "$daemon_pid" ]; then
              kill -TERM "$daemon_pid" 2>/dev/null || true
              wait "$daemon_pid" 2>/dev/null || true
            fi
            rm -rf "$package" "$state"
          }
          trap cleanup EXIT
          package=$(mktemp -d)
          npm pack --pack-destination "$package"
          npm install --prefix "$package/installed" "$package"/*.tgz
          PTY_DAEMON_DIR="$state" bun --cwd "$package/installed/node_modules/opencode-pty" dist/src/daemon/main.js &
          daemon_pid=$!
          for _ in $(seq 1 20); do test -f "$state/daemon.json" && break; sleep 0.1; done
          test -f "$state/daemon.json"

  windows-package-smoke:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8
      - run: bun ci
      - name: Run full daemon/package suite
        run: bun unittest
      - run: bun build:prod
      - name: Pack, import, and start the daemon
        shell: pwsh
        run: |
          $package = Join-Path $env:RUNNER_TEMP "opencode-pty-$([guid]::NewGuid())"
          $state = Join-Path $env:RUNNER_TEMP "opencode-pty-state-$([guid]::NewGuid())"
          $previousState = $env:PTY_DAEMON_DIR
          $daemon = $null
          try {
            New-Item -ItemType Directory -Path $package, $state | Out-Null
            npm pack --pack-destination $package
            $archive = (Get-ChildItem -Path $package -Filter *.tgz | Select-Object -First 1).FullName
            npm install --prefix (Join-Path $package installed) $archive
            $installed = Join-Path $package 'installed/node_modules/opencode-pty'
            bun --cwd (Join-Path $package installed) -e "const plugin = await import('opencode-pty'); if (typeof plugin.PTYPlugin -ne 'function' -or plugin.server -ne plugin.PTYPlugin) { throw 'Package is missing compatible PTYPlugin/server exports.' }"
            $env:PTY_DAEMON_DIR = $state
            $daemon = Start-Process -FilePath bun -ArgumentList @('--cwd', $installed, 'dist/src/daemon/main.js') -PassThru
            1..40 | ForEach-Object {
              if (Test-Path (Join-Path $state daemon.json)) { return }
              Start-Sleep -Milliseconds 100
            }
            if (-not (Test-Path (Join-Path $state daemon.json))) { throw 'Packaged daemon did not start.' }
          } finally {
            if ($null -ne $daemon -and -not $daemon.HasExited) {
              Stop-Process -Id $daemon.Id -Force -ErrorAction SilentlyContinue
              Wait-Process -Id $daemon.Id -ErrorAction SilentlyContinue
            }
            $env:PTY_DAEMON_DIR = $previousState
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue $package, $state
          }

  nix-flake-test:
    name: Devenv CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@v3
      - name: Install devenv
        run: nix profile add nixpkgs#devenv
      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Build (Devenv shell)
        run: devenv shell -- bun build:prod

      - name: Quality checks (bun test)
        run: devenv shell -- bun unittest
      - name: Quality checks (typecheck)
        run: devenv shell -- bun typecheck
      - name: Quality checks (lint)
        run: devenv shell -- bun lint
      - name: Quality checks (format)
        run: devenv shell -- bun format
