name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
        quality: [unittest, typecheck, lint, format, "run tui:verify"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.93.0

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun ci

      - name: Build
        run: bun build:prod

      - name: Build native worker
        run: cargo build --locked --workspace

      - name: Test native worker
        run: cargo test --locked --workspace

      - name: Run quality step
        run: bun ${{matrix.quality}}

  dependency-review:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  package-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8
      - uses: dtolnay/rust-toolchain@1.93.0
      - run: bun ci
      - run: cargo build --locked --workspace
      - name: Run daemon suite
        run: bun unittest
      - name: Lint native worker
        run: cargo clippy --locked --workspace -- -D warnings
      - run: bun build:prod
      - name: Packaged-worker smoke (including Windows ConPTY echo and Job drain)
        run: bun package:smoke
      - name: Pack and import the artifact
        if: runner.os == 'Linux'
        run: |
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          npm pack --pack-destination "$tmpdir"
          npm install --prefix "$tmpdir/installed" "$tmpdir"/*.tgz
          bun --cwd "$tmpdir/installed" -e "const [plugin, server, tui] = await Promise.all(['opencode-pty', 'opencode-pty/server', 'opencode-pty/tui'].map(specifier => import(specifier))); if (typeof plugin.PTYPlugin !== 'function' || plugin.server !== plugin.PTYPlugin || server.server !== plugin.PTYPlugin || typeof tui.tui !== 'function') throw new Error('Package is missing compatible server or TUI exports.')"
      - name: Start the packaged daemon entrypoint
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          state=$(mktemp -d)
          package=""
          daemon_pid=""
          cleanup() {
            if [ -n "$daemon_pid" ]; then
              kill -TERM "$daemon_pid" 2>/dev/null || true
              wait "$daemon_pid" 2>/dev/null || true
            fi
            rm -rf "$package" "$state"
          }
          trap cleanup EXIT
          package=$(mktemp -d)
          npm pack --pack-destination "$package"
          npm install --prefix "$package/installed" "$package"/*.tgz
          PTY_DAEMON_DIR="$state" bun --cwd "$package/installed/node_modules/opencode-pty" dist/src/daemon/main.js &
          daemon_pid=$!
          for _ in $(seq 1 20); do test -f "$state/daemon.json" && break; sleep 0.1; done
          test -f "$state/daemon.json"

  nix-flake-test:
    name: Devenv CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@v3
      - name: Install devenv
        run: nix profile add nixpkgs#devenv
      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Build (Devenv shell)
        run: devenv shell -- bun build:prod

      - name: Quality checks (bun test)
        run: devenv shell -- cargo build --locked --workspace && devenv shell -- bun unittest
      - name: Quality checks (typecheck)
        run: devenv shell -- bun typecheck
      - name: Quality checks (lint)
        run: devenv shell -- bun lint
      - name: Quality checks (format)
        run: devenv shell -- bun format
      - name: Quality checks (TUI build)
        run: devenv shell -- bun run tui:verify
